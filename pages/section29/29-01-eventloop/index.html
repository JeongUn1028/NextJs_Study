<!doctype html>
<html lang="ko">
  <head>
    <title>Event Loop</title>
    <script>
      const onClickLoop = () => {
        console.log("Start Loop");
        setTimeout(() => {
          console.log("After 0ms");
        }, 0);
        let sum = 0;
        for (let i = 0; i < 1000000000; i++) {
          sum += i;
          if (i % 100000000 === 0) {
            console.log(`Sum at ${i}: ${sum}`);
          }
        }
        console.log("End Loop");
      };
    </script>
  </head>
  <body>
    <button onclick="onClickLoop()">Start Event Loop</button>
  </body>
</html>
